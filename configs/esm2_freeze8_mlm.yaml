project: peptide_domain_esm2_mlm_adaptation
purpose: peptide_domain_representation_and_variant_proposal

backbone:
  model_family: ESM2
  model_size: t12
  freeze_policy: freeze_lower_8_layers
  trainable_layers: upper_4_layers

training_data:
  corpus: PeptideAtlas
  labels_used: false
  ic50_labels_used: false
  experimental_context_used: false

outputs:
  - peptide_domain_encoder_for_mean_embeddings
  - masked_language_model_for_variant_proposal

reported_validation:
  validation_sequences: 35980
  masked_tokens: 86194
  pseudo_perplexity_after_adaptation: 11.49

notes:
  - The MLM is not evidence of experimentally validated peptide optimization.
  - Generated variants are computational hypotheses that require follow-up testing.
